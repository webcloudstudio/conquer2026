services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: conquer
      POSTGRES_PASSWORD: conquer
      POSTGRES_DB: conquer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U conquer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://conquer:conquer@db:5432/conquer
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-change-in-production
      DEBUG: "true"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Phase 4: Celery worker for turn processing
  # worker:
  #   build: ./backend
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://conquer:conquer@db:5432/conquer
  #     REDIS_URL: redis://redis:6379/0
  #   depends_on:
  #     - db
  #     - redis
  #   command: celery -A app.tasks worker --loglevel=info

volumes:
  postgres_data:
