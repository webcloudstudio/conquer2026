name: Backend CI

on:
  push:
    paths:
      - "new/backend/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    paths:
      - "new/backend/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: new/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: new/backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]" aiosqlite

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing -v
